<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Masterpiece</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: auto; }
    body {
      background: #0a0a0a;
      font-family: 'Google Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ══════════════════════════
       HELLO INTRO
    ══════════════════════════ */
    #hello-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      pointer-events: none;
    }
    #hello-overlay.out {
      animation: wipeUp 0.65s cubic-bezier(.76,0,.24,1) forwards;
    }
    @keyframes wipeUp {
      from { clip-path: inset(0 0 0% 0); }
      to   { clip-path: inset(0 0 100% 0); }
    }
    #hello-word {
      font-size: clamp(54px, 13vw, 118px);
      font-weight: 700; color: #fff; letter-spacing: -2px;
      opacity: 0; transform: scale(0.78);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #hello-word.in  { opacity: 1; transform: scale(1); }
    #hello-word.out2{ opacity: 0; transform: scale(1.16);
                      transition: opacity 0.2s ease, transform 0.2s ease; }
    #hello-lang {
      font-size: 11px; color: rgba(255,255,255,0.28);
      letter-spacing: 3px; text-transform: uppercase;
      opacity: 0; transition: opacity 0.28s ease;
    }
    #hello-lang.in { opacity: 1; }
    #hello-dots { display: flex; gap: 8px; margin-top: 4px; }
    .hdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.18);
      transition: background .3s, transform .3s;
    }
    .hdot.on { background: #fff; transform: scale(1.4); }


    /* ══════════════════════════
       SCROLL CANVAS
    ══════════════════════════ */
    #scroll-canvas {
      position: relative;
      height: 600vh;          /* tall enough for a smooth scrub */
    }

    /* The sticky viewport — stays fixed while user scrolls */
    #stage {
      position: sticky;
      top: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      /* CRITICAL: perspective here so child rotateX works in 3-D */
      perspective: 1100px;
      perspective-origin: 50% 60%;
      /* do NOT set overflow:hidden — it breaks sticky children perspective */
    }

    /* Soft glow */
    #stage::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 55%,
                    rgba(180,180,180,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Scroll cue */
    #scroll-cue {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      transition: opacity .4s ease;
    }
    #scroll-cue .pip {
      width: 1px; height: 24px;
      background: linear-gradient(to bottom, rgba(255,255,255,.45), transparent);
      animation: pipAnim 1.7s ease-in-out infinite;
    }
    @keyframes pipAnim {
      0%,100% { opacity:.3; transform: translateY(0);   }
      50%      { opacity:1;  transform: translateY(6px); }
    }


    /* ══════════════════════════
       MACBOOK
    ══════════════════════════ */
    #mac-wrap {
      position: relative;
      /* JS animates scale + translateY here for zoom */
      will-change: transform;
      transform-origin: center center;
    }

    /* ── Lid — rotates in 3-D (perspective comes from #stage) ── */
    #mac-lid {
      display: block;
      width: 620px;
      transform-origin: bottom center;
      /* JS sets rotateX; start nearly closed showing back of lid */
      transform: rotateX(86deg);
      will-change: transform;
      margin-bottom: -2px;
      position: relative;
      z-index: 3;
    }

    /* Outer shell (aluminium back) */
    #lid-back {
      width: 620px; height: 385px;
      background: linear-gradient(155deg, #d0d0d0 0%, #a8a8a8 55%, #8e8e8e 100%);
      border-radius: 13px 13px 0 0;
      box-shadow: 0 -3px 20px rgba(0,0,0,.5),
                  inset 0 1px 0 rgba(255,255,255,.22);
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    /* Apple logo */
    #apple-logo {
      width: 50px; height: 50px; opacity: 0.22; position: absolute;
    }

    /* Inner bezel (screen side) */
    #lid-front {
      position: absolute; inset: 0;
      border-radius: 13px 13px 0 0;
      background: #181818;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
    }

    /* Camera dot */
    #cam { 
      position: absolute; top: 9px; left: 50%; transform: translateX(-50%);
      width: 7px; height: 7px; background: #2c2c2c; border-radius: 50%;
    }

    /* Screen bezel window */
    #mac-screen {
      width: 562px; height: 350px;
      background: #000;
      border-radius: 5px;
      overflow: hidden;
      border: 2px solid #080808;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
      position: relative;
    }

    /* Scaled-down version of main page lives here */
    /* 562px / 1440px = 0.3903 */
    #inner-site {
      width: 1440px;
      height: 900px;
      transform: scale(0.3903);
      transform-origin: top left;
      background: #f5f5f5;
      overflow: hidden;
      pointer-events: none;
    }

    /* ── Base ── */
    #mac-base {
      width: 620px; height: 26px;
      background: linear-gradient(180deg, #b8b8b8 0%, #909090 45%, #747474 100%);
      border-radius: 0 0 14px 14px;
      box-shadow: 0 8px 34px rgba(0,0,0,.75),
                  inset 0 1px 0 rgba(255,255,255,.13);
      position: relative; z-index: 2;
    }
    #mac-base::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, #555, #aaa, #555);
      border-radius: 2px 2px 0 0;
    }
    #mac-base::after {
      content: '';
      position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
      width: 140px; height: 88px;
      background: rgba(0,0,0,.15); border-radius: 8px;
      border: 1px solid rgba(255,255,255,.08);
    }


    /* ══════════════════════════
       INNER SITE STYLES
    ══════════════════════════ */
    .i-hero {
      width: 100%; height: 100%;
      background: #f5f5f5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px; position: relative;
    }
    .i-tag {
      position: absolute; padding: 10px 28px; border-radius: 999px;
      font-size: 22px; font-weight: 500; font-family: 'Google Sans', sans-serif;
      background: #d4f0e4; color: #1a7a4a; border: 1.5px solid #a8d9c0;
    }
    .i-tag-l { top: 90px; left: 90px; }
    .i-tag-r { top: 90px; right: 90px; }
    .i-headline {
      font-size: 100px; font-weight: 700; color: #1a1a1a;
      letter-spacing: -3px; text-align: center; margin-bottom: 60px;
      font-family: 'Google Sans', sans-serif;
    }
    .i-cards {
      position: relative; width: 100%; height: 260px;
      display: flex; align-items: center; justify-content: center;
    }
    .i-card {
      width: 260px; height: 168px; border-radius: 18px;
      overflow: hidden; position: absolute;
      box-shadow: 0 14px 42px rgba(0,0,0,.2);
    }
    .i-card svg { width: 100%; height: 100%; display: block; }


    /* ══════════════════════════
       MAIN PAGE
    ══════════════════════════ */
    #main-page {
      min-height: 100vh;
      background: #f5f5f5;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .7s ease;
    }
    #main-page.show { opacity: 1; pointer-events: all; }

    .hero {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 40px 100px;
      position: relative; width: 100%; max-width: 1200px;
    }
    .tag {
      position: absolute; padding: 6px 16px; border-radius: 999px;
      font-size: 13px; font-weight: 500; z-index: 10;
    }
    .tag-l { top:80px; left:60px;  background:#d4f0e4; color:#1a7a4a; border:1px solid #a8d9c0; }
    .tag-r { top:80px; right:60px; background:#d4f0e4; color:#1a7a4a; border:1px solid #a8d9c0; }
    .headline {
      font-size: clamp(36px,6vw,64px); font-weight:700; color:#1a1a1a;
      letter-spacing:-1.5px; margin-bottom:56px; text-align:center;
    }
    .cards-track {
      position:relative; width:100%; height:200px;
      display:flex; align-items:center; justify-content:center;
    }
    .card {
      width:200px; height:130px; border-radius:14px; overflow:hidden;
      position:absolute; box-shadow:0 10px 30px rgba(0,0,0,.18);
      cursor:pointer; transition: box-shadow .3s ease, transform .25s ease;
    }
    .card svg { width:100%; height:100%; display:block; pointer-events:none; }

    @keyframes wave0{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-16px)}}
    @keyframes wave1{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-20px)}}
    @keyframes wave2{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-14px)}}
    @keyframes wave3{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-22px)}}
    @keyframes wave4{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-15px)}}
    @keyframes wave5{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-19px)}}
    @keyframes wave6{0%,100%{transform:var(--bt) translateY(0)}50%{transform:var(--bt) translateY(-13px)}}
    .card.w0{animation:wave0 3.2s ease-in-out 0.0s infinite}
    .card.w1{animation:wave1 3.7s ease-in-out 0.5s infinite}
    .card.w2{animation:wave2 3.0s ease-in-out 1.0s infinite}
    .card.w3{animation:wave3 3.9s ease-in-out 0.3s infinite}
    .card.w4{animation:wave4 3.3s ease-in-out 0.8s infinite}
    .card.w5{animation:wave5 3.6s ease-in-out 0.2s infinite}
    .card.w6{animation:wave6 2.9s ease-in-out 1.2s infinite}
    .card:hover{
      box-shadow:0 24px 50px rgba(0,0,0,.28);
      z-index:50!important; animation-play-state:paused!important;
      transform:var(--bt) translateY(-22px) scale(1.07)!important;
    }
  </style>
</head>
<body>

<!-- HELLO INTRO -->
<div id="hello-overlay">
  <div id="hello-word"></div>
  <div id="hello-lang"></div>
  <div id="hello-dots"></div>
</div>

<!-- SCROLL CANVAS -->
<div id="scroll-canvas">
  <div id="stage">

    <div id="mac-wrap">
      <!-- LID -->
      <div id="mac-lid">
        <div id="lid-back">
          <!-- Apple logo -->
          <svg id="apple-logo" viewBox="0 0 814 1000" xmlns="http://www.w3.org/2000/svg">
            <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-42.3-149.3-93.3C88.7 763 32.8 646.9 32.8 537.4c0-168.3 109.4-257.7 215-257.7 58.7 0 107.5 38.9 144.5 38.9 35.4 0 90.7-41.1 156.4-41.1 25.2 0 108.2 2.6 168.3 78.3zm-104-185.8c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z" fill="#111"/>
          </svg>
          <!-- Inner screen face -->
          <div id="lid-front">
            <div id="cam"></div>
            <div id="mac-screen">
              <div id="inner-site">
                <div class="i-hero">
                  <div class="i-tag i-tag-l">@cocolin</div>
                  <div class="i-tag i-tag-r">@lonchee</div>
                  <h1 class="i-headline">masterpiece.</h1>
                  <div class="i-cards" id="iCardsTrack"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- BASE -->
      <div id="mac-base"></div>
    </div>

    <div id="scroll-cue">
      <span>Scroll to open</span>
      <div class="pip"></div>
    </div>

  </div><!-- /stage -->
</div><!-- /scroll-canvas -->

<!-- MAIN PAGE -->
<div id="main-page">
  <section class="hero">
    <div class="tag tag-l">@cocolin</div>
    <div class="tag tag-r">@lonchee</div>
    <h1 class="headline">masterpiece.</h1>
    <div class="cards-track" id="cardsTrack"></div>
  </section>
</div>


<script>
/* ─── Card SVG data ─── */
const SVGS = [
  `<rect width="200" height="130" fill="#c0392b"/><rect x="0" y="70" width="105" height="60" fill="#27ae60"/><rect x="100" y="0" width="100" height="62" fill="#f0e3c0"/><rect x="8" y="8" width="60" height="44" fill="white" opacity="0.72"/><circle cx="155" cy="95" r="22" fill="#e74c3c" opacity="0.88"/><rect x="102" y="62" width="98" height="44" fill="#1e8449"/>`,
  `<rect width="200" height="130" fill="#eef4fa"/><circle cx="100" cy="62" r="40" fill="none" stroke="#3a7faf" stroke-width="1.5"/><circle cx="100" cy="62" r="22" fill="#d4e8f5" stroke="#3a7faf" stroke-width="1"/><ellipse cx="100" cy="56" rx="9" ry="13" fill="#7baac8" opacity="0.9"/><path d="M68 90 Q100 70 132 90" fill="none" stroke="#3a7faf" stroke-width="1.3"/>`,
  `<rect width="200" height="130" fill="#f5c800"/><rect x="14" y="14" width="172" height="11" fill="#1a1a1a" rx="2"/><rect x="14" y="32" width="65" height="9" fill="#e53935" rx="2"/><rect x="22" y="48" width="156" height="42" fill="#d4a800" rx="6"/><rect x="14" y="98" width="172" height="14" fill="#1a1a1a" rx="2"/>`,
  `<defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f9c5c5"/><stop offset="100%" stop-color="#fde8c0"/></linearGradient></defs><rect width="200" height="130" fill="url(#pg)"/><circle cx="140" cy="42" r="34" fill="#e8a87c" opacity="0.65"/><ellipse cx="72" cy="88" rx="38" ry="24" fill="#c0392b" opacity="0.20"/><path d="M10 108 Q100 72 190 108" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.5"/>`,
  `<rect width="200" height="130" fill="#16213e"/><circle cx="100" cy="52" r="34" fill="#e74c3c" opacity="0.9"/><rect x="10" y="78" width="180" height="22" fill="#e74c3c" opacity="0.85" rx="2"/><text x="16" y="94" font-size="12" fill="white" font-family="sans-serif" font-weight="700">avec laqeur</text><text x="148" y="120" font-size="20" fill="white" font-family="sans-serif" font-weight="900">66</text>`,
  `<rect width="200" height="130" fill="#e74c3c"/><rect x="0" y="0" width="100" height="65" fill="#1565c0"/><rect x="100" y="65" width="100" height="65" fill="#fbc02d"/><rect x="100" y="0" width="100" height="65" fill="#e74c3c"/><rect x="0" y="65" width="100" height="65" fill="#2e7d32"/><text x="10" y="46" font-size="24" fill="white" font-family="sans-serif" font-weight="900" opacity="0.85">ART</text>`,
  `<rect width="200" height="130" fill="#1b4332"/><circle cx="46" cy="38" r="26" fill="#40916c" opacity="0.80"/><circle cx="168" cy="28" r="19" fill="#52b788" opacity="0.65"/><path d="M10 70 Q100 42 190 70 Q148 102 100 118 Q52 102 10 70Z" fill="#2d6a4f" opacity="0.9"/><text x="14" y="84" font-size="28" fill="white" font-family="sans-serif" font-weight="900" opacity="0.85" transform="rotate(-8 14 84)">S</text><text x="108" y="106" font-size="22" fill="#95d5b2" font-family="sans-serif" font-weight="900" opacity="0.9" transform="rotate(4 108 106)">?</text>`,
];

const MAIN_POSITIONS  = [-420,-255,-92,70,230,385,535];
const MAIN_ROTS       = [-14,-8,-3,3,8,13,18];
const INNER_POSITIONS = [-490,-295,-108,82,272,458,630];

function spawnCards(trackId, positions, rots, W, H, isMain) {
  const track = document.getElementById(trackId);
  if (!track || track.children.length) return;
  SVGS.forEach((svg, i) => {
    const d = document.createElement('div');
    d.className = isMain ? 'card' : 'i-card';
    const bt = `translateX(${positions[i]}px) rotate(${rots[i]}deg)`;
    if (isMain) {
      d.style.cssText = `--bt:${bt}; transform:${bt}; z-index:${7-i};`;
      d.classList.add(`w${i}`);
      d.addEventListener('mouseenter', () => d.style.transform = `${bt} translateY(-22px) scale(1.07)`);
      d.addEventListener('mouseleave', () => d.style.transform = bt);
    } else {
      d.style.cssText = `transform:${bt}; z-index:${7-i};`;
    }
    const scaledSvg = svg
      .replace(/width="200"/g, `width="${W}"`)
      .replace(/height="130"/g, `height="${H}"`);
    d.innerHTML = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${scaledSvg}</svg>`;
    track.appendChild(d);
  });
}

/* Build inner cards immediately */
spawnCards('iCardsTrack', INNER_POSITIONS, MAIN_ROTS, 260, 168, false);


/* ─── Hello intro ─── */
const HELLOS = [
  { word:'Hello',   lang:'English'  },
  { word:'नमस्ते',  lang:'Hindi'    },
  { word:'Hola',    lang:'Spanish'  },
  { word:'你好',     lang:'Chinese'  },
  { word:'Bonjour', lang:'French'   },
];
const $word = document.getElementById('hello-word');
const $lang = document.getElementById('hello-lang');
const $dots = document.getElementById('hello-dots');

HELLOS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'hdot' + (i===0 ? ' on' : '');
  $dots.appendChild(d);
});
const allDots = $dots.querySelectorAll('.hdot');
let hCur = 0;

function showH(idx) {
  allDots.forEach((d,i) => d.classList.toggle('on', i===idx));
  $word.textContent = HELLOS[idx].word;
  $lang.textContent = HELLOS[idx].lang;
  $word.className = '';
  $lang.className = '';
  requestAnimationFrame(() => {
    $word.classList.add('in');
    setTimeout(() => $lang.classList.add('in'), 90);
  });
}
function nextH() {
  $word.classList.remove('in'); $word.classList.add('out2');
  $lang.classList.remove('in');
  setTimeout(() => {
    hCur++;
    if (hCur < HELLOS.length) { showH(hCur); setTimeout(nextH, 750); }
    else {
      const ov = document.getElementById('hello-overlay');
      ov.classList.add('out');
      setTimeout(() => ov.style.display = 'none', 650);
    }
  }, 240);
}
showH(0);
setTimeout(nextH, 750);


/* ─── Scroll scrub ─── */
const stage     = document.getElementById('stage');
const macWrap   = document.getElementById('mac-wrap');
const macLid    = document.getElementById('mac-lid');
const cue       = document.getElementById('scroll-cue');
const mainPage  = document.getElementById('main-page');

const CANVAS_H  = document.getElementById('scroll-canvas').offsetHeight;

// Phase split (fraction of total scroll)
// 0.00–0.40 → lid opens
// 0.40–0.82 → mac zooms to fill screen
// 0.82–1.00 → main page fades in

const P1 = 0.40;   // lid fully open by here
const P2 = 0.82;   // zoom complete by here

let built = false;
let raf   = null;
let targetScroll = 0;

function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
function lerp(a, b, t) { return a + (b-a)*t; }
function clamp(v,a,b) { return Math.min(b, Math.max(a, v)); }

function render() {
  raf = null;
  const VH = window.innerHeight;
  const maxScroll = CANVAS_H - VH;
  const prog = clamp(targetScroll / maxScroll, 0, 1);

  /* ── Phase 1: lid opens ─────────────────────── */
  const t1 = clamp(prog / P1, 0, 1);
  // 86° (nearly closed, back of lid faces you) → -8° (lid leans back, screen visible)
  const lidAngle = lerp(86, -8, ease(t1));
  macLid.style.transform = `rotateX(${lidAngle}deg)`;

  /* Scroll cue */
  cue.style.opacity = prog < 0.03 ? '1' : '0';

  /* ── Phase 2: zoom ──────────────────────────── */
  const t2 = clamp((prog - P1) / (P2 - P1), 0, 1);
  const et2 = ease(t2);

  // Screen is 562px wide; we want it to fill viewport width
  const VW = window.innerWidth;
  const maxScale = VW / 562;          // scale so screen = full viewport width
  const sc = lerp(1, maxScale, et2);

  // Lift mac so screen centre meets viewport centre
  // Mac total height ~411px. Screen centre from top of mac-wrap ≈ 385/2 = 192px
  const macScreenCentreFromTop = 192; // px within mac-wrap
  const targetCentreFromTop = VH / 2; // we want it here
  // After scaling, element positions shift; compensate with translateY
  const ty = lerp(0, (targetCentreFromTop - macScreenCentreFromTop) / sc * et2 * 1.1, et2);

  macWrap.style.transform = `scale(${sc}) translateY(${ty}px)`;

  /* ── Phase 3: reveal main page ──────────────── */
  const t3 = clamp((prog - P2) / (1 - P2), 0, 1);
  stage.style.opacity = String(1 - t3);

  if (t3 > 0.1) {
    mainPage.classList.add('show');
    if (!built) {
      built = true;
      spawnCards('cardsTrack', MAIN_POSITIONS, MAIN_ROTS, 200, 130, true);
    }
  } else {
    if (t3 === 0) mainPage.classList.remove('show');
  }
}

function onScroll() {
  targetScroll = window.scrollY;
  if (!raf) raf = requestAnimationFrame(render);
}

window.addEventListener('scroll', onScroll, { passive: true });
window.addEventListener('resize', () => { if (!raf) raf = requestAnimationFrame(render); });
render(); // initial paint
</script>
