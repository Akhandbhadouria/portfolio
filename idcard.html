<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  /* --- General Section & Container Styling --- */
.projects-section {
    padding: 80px 20px;
    background-color: #1a1a1a; /* Dark background for high contrast */
    color: white;
    text-align: center;
    overflow: hidden; /* Important for clean perspective */
}

.projects-section h2 {
    margin-bottom: 60px;
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* Perspective adds depth to all children */
.projects-container {
    position: relative;
    max-width: 1100px;
    margin: 0 auto;
    perspective: 1500px; /* Crucial for 3D effect */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 500px; /* Spacing for the stacked layers */
}

/* --- Base Layer Styling (Common to all layers) --- */
.project-layer {
    display: flex;
    justify-content: center;
    gap: 40px; /* Space between the two projects in each layer */
    position: absolute; /* Stack them all in the center */
    width: 100%;
    transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); /* Smooth animation */
}

/* Base Card Styling (Modern & Clean) */
.project-card {
    border-radius: 15px;
    background: white;
    color: #333;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* --- Layer 1: Foreground (MAIN PROJECTS - Data Science & Full Stack) --- */
.layer-1.main-projects {
    z-index: 10; /* Highest layer */
    position: relative; /* Stays in normal flow */
    transform: translateZ(0px); /* Keeps it at base depth */
}

.project-card.main-card {
    width: 400px; /* Bold size */
    padding: 40px;
    border-top: 8px solid; /* Bold accent border */
}

/* Hover effect on main cards only */
.project-card.main-card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 15px 40px rgba(52, 152, 219, 0.4); /* Blue glow example */
}

.data-science { border-color: #3498db; }
.full-stack { border-color: #2ecc71; }


/* --- Layer 2: The "Peek Out" Layer (VISIBLE BEHIND) --- */
.layer-2 {
    z-index: 5;
    opacity: 0.8; /* Still quite visible */
    /* Rotate and move slightly down/back */
    transform: translateZ(-100px) translateY(30px) rotateX(5deg);
}

.layer-2 .secondary-card {
    width: 360px; /* Slightly smaller */
    height: 250px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    font-weight: bold;
    background: #e0e0e0; /* Darker than main */
    color: #555;
}

/* --- Layer 3: The Far Background (MORE PEEKING) --- */
.layer-3 {
    z-index: 2;
    opacity: 0.5; /* More faded */
    /* Rotate more, move further back/down */
    transform: translateZ(-200px) translateY(60px) rotateX(10deg);
}

.layer-3 .secondary-card {
    width: 320px; /* Smallest cards */
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #cccccc;
    color: #777;
}

/* --- Optional: Hover Section to reveal everything --- */
/* Jab user pure section par hover kare, peeche wale projects bahar nikal aayein */
.projects-container:hover .layer-2 {
    transform: translateZ(-50px) translateY(120px) translateX(-20px) rotateX(0deg); /* Peek Left */
    opacity: 1;
}

.projects-container:hover .layer-3 {
    transform: translateZ(-80px) translateY(200px) translateX(20px) rotateX(0deg); /* Peek Right */
    opacity: 0.8;
}
</style>
<body>
  <section class="projects-section">
    <h2>My Projects</h2>
    
    <div class="projects-container">
        
        <div class="project-layer layer-3">
            <div class="project-card secondary-card">Project D</div>
            <div class="project-card secondary-card">Project E</div>
        </div>
        
        <div class="project-layer layer-2">
            <div class="project-card secondary-card">Project B</div>
            <div class="project-card secondary-card">Project C</div>
        </div>

        <div class="project-layer layer-1 main-projects">
            
            <div class="project-card main-card data-science">
                <div class="card-content">
                    <h3>Data Science</h3>
                    <p>Machine Learning Model for...</p>
                    <a href="#" class="btn">View Project</a>
                </div>
            </div>

            <div class="project-card main-card full-stack">
                <div class="card-content">
                    <h3>Full Stack</h3>
                    <p>E-commerce Web Application...</p>
                    <a href="#" class="btn">View Project</a>
                </div>
            </div>
            
        </div>

    </div>
</section>
</body>
</html>
